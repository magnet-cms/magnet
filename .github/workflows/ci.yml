name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint (core, common, e2e)
        run: |
          bun run --cwd packages/core lint
          bun run --cwd packages/common lint
          bun run --cwd apps/e2e lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages (required for cross-package type resolution)
        run: bunx turbo run build --filter=@magnet-cms/core...

      - name: Type check (core, common, e2e)
        run: |
          bun run --cwd packages/common check-types
          bun run --cwd packages/core check-types
          bun run --cwd apps/e2e check-types

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bunx turbo run build --filter=@magnet-cms/core...

      - name: Check admin bundle size
        run: |
          bunx turbo run build --filter=@magnet-cms/admin...
          echo "Admin bundle size:"
          du -sh packages/client/admin/dist/
          # Fail if total JS exceeds 5MB (generous limit for initial baseline)
          TOTAL_KB=$(find packages/client/admin/dist -name "*.js" -exec du -k {} + 2>/dev/null | awk '{sum += $1} END {print sum}')
          echo "Total JS: ${TOTAL_KB:-0}KB"
          if [ "${TOTAL_KB:-0}" -eq 0 ]; then
            echo "ERROR: No JS files found in dist — build may have failed"
            exit 1
          fi
          if [ "${TOTAL_KB}" -gt 5120 ]; then
            echo "ERROR: Admin JS bundle exceeds 5MB limit (${TOTAL_KB}KB)"
            exit 1
          fi
