services:
  postgres:
    image: postgres:16-alpine
    container_name: drizzle-neon-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: neon-example
    volumes:
      - drizzle-neon-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: drizzle-neon-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - drizzle-neon-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: drizzle-neon-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb local/magnet-media --ignore-existing
        echo "MinIO bucket 'magnet-media' created successfully"

  mailpit:
    image: axllent/mailpit:latest
    container_name: drizzle-neon-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8025/api/v1/messages"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  drizzle-neon-data:
  drizzle-neon-minio-data:
