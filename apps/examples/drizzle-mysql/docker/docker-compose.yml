name: drizzle-mysql

services:
  mysql:
    image: mysql:8
    container_name: drizzle-mysql-db
    restart: unless-stopped
    ports:
      - '3307:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: magnet
    volumes:
      - drizzle-mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-proot']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: drizzle-mysql-minio
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - drizzle-mysql-minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: drizzle-mysql-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: 'no'
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb local/magnet-media --ignore-existing
        echo "MinIO bucket 'magnet-media' created successfully"

  mailpit:
    image: axllent/mailpit:latest
    container_name: drizzle-mysql-mailpit
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'
    healthcheck:
      test: ['CMD', 'wget', '--spider', '--quiet', 'http://localhost:8025/api/v1/messages']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  drizzle-mysql-data:
  drizzle-mysql-minio-data:
