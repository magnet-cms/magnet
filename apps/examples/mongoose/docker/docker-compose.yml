name: mongoose

services:
  mongodb:
    image: mongo:7.0
    container_name: mongoose-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: cats-example
    volumes:
      - mongoose-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  vault:
    image: hashicorp/vault:1.17
    container_name: mongoose-vault
    restart: unless-stopped
    ports:
      - '8200:8200'
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-token
      VAULT_DEV_LISTEN_ADDRESS: '0.0.0.0:8200'
      VAULT_ADDR: 'http://127.0.0.1:8200'
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ['CMD', 'vault', 'status']
      interval: 10s
      timeout: 5s
      retries: 5

  vault-init:
    image: hashicorp/vault:1.17
    container_name: mongoose-vault-init
    depends_on:
      vault:
        condition: service_healthy
    restart: 'no'
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-token
    entrypoint: /bin/sh
    command:
      - -c
      - |
        vault kv put secret/magnet/database uri=mongodb://mongodb:27017/cats-example
        vault kv put secret/magnet/jwt secret=development-secret-key
        vault kv put secret/magnet/email host=mailpit port=1025 fromAddress=noreply@magnet.local fromName="Magnet CMS"
        echo "Vault secrets seeded successfully"

  mailpit:
    image: axllent/mailpit:latest
    container_name: mongoose-mailpit
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'
    healthcheck:
      test: ['CMD', 'wget', '--spider', '--quiet', 'http://localhost:8025/api/v1/messages']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongoose-data:
